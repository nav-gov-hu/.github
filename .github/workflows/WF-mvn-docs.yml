# Generate and publish documentation workflow
name: (WF-mvn) Generate and publish documentation

on:
  workflow_call:
    inputs:
      runs-on-os:
        required: false
        type: string
        default: 'ubuntu-latest'
        description: 'Operating system to run the job on'
      java-version:
        required: false
        type: string
        default: '21'
        description: 'Java version to use for the job'

jobs:
  generate-on-os-with-jdk:
    runs-on: ${{ inputs.runs-on-os }}
    name: Generate on ${{ inputs.runs-on-os }} with JDK ${{ inputs.java-version }}
    steps:
      - name: Checkout ${{ inputs.java-version }}
        uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven on ${{ inputs.java-version }} JDK
        run: mvn -B package --file pom.xml

      - name: Get project version from POM
        id: vars
        run: |
          sudo apt-get update && sudo apt-get install -y libxml2-utils
          POM_XML_PROJECT_VERSION=`echo -e 'setns x=http://maven.apache.org/POM/4.0.0\ncat /x:project/x:version/text()' | xmllint --shell pom.xml | grep -v /`
          echo "POM_XML_PROJECT_VERSION=$POM_XML_PROJECT_VERSION" >> $GITHUB_OUTPUT
          echo CURRENT_VERSION=${POM_XML_PROJECT_VERSION}

      - name: Generate documentation
        uses: manoelcampos/asciidoctor-ghpages-action@v2
        with:
          pdf_build: true
          asciidoctor_params: --attribute release_version=${{steps.vars.outputs.POM_XML_PROJECT_VERSION}} --attribute=generatedDoc
          source_dir: docs # default is .
          ebook_main_adoc_file: index
